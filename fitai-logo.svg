<svg xmlns="http://www.w3.org/2000/svg" width="600" height="198" viewBox="0 0 600 198">

  <defs>
    <linearGradient id="plate-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="40%"  stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="plate-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#444"/>
      <stop offset="40%"  stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="bar-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9a9a9a"/>
      <stop offset="35%"  stop-color="#e8e8e8"/>
      <stop offset="65%"  stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <linearGradient id="collar-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b0b0b0"/>
      <stop offset="50%"  stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="plate-face-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="50%"  stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="plate-face-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#666"/>
      <stop offset="50%"  stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="txt-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#0A0A0F" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect x="0" y="0" width="600" height="198" rx="16" fill="#0A0A0F"/>

  <!-- Haltere -->
  <g transform="translate(260, 99)">
    <!-- Barra -->
    <rect x="-58" y="-5" width="116" height="10" rx="5" fill="url(#bar-g)"/>
    <!-- Colares -->
    <rect x="-46" y="-9" width="12" height="18" rx="3" fill="url(#collar-g)"/>
    <rect x="34"  y="-9" width="12" height="18" rx="3" fill="url(#collar-g)"/>
    <!-- Anilha esquerda -->
    <rect x="-72" y="-42" width="26" height="84" rx="5" fill="url(#plate-l)"/>
    <ellipse cx="-72" cy="0" rx="8" ry="42" fill="url(#plate-face-l)"/>
    <ellipse cx="-72" cy="0" rx="3" ry="12" fill="#1a1a1a" opacity="0.7"/>
    <line x1="-72" y1="-28" x2="-72" y2="-20" stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <line x1="-72" y1="20"  x2="-72" y2="28"  stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <!-- Anilha direita -->
    <rect x="46"  y="-42" width="26" height="84" rx="5" fill="url(#plate-r)"/>
    <ellipse cx="72" cy="0" rx="8" ry="42" fill="url(#plate-face-r)"/>
    <ellipse cx="72" cy="0" rx="3" ry="12" fill="#1a1a1a" opacity="0.7"/>
    <line x1="72" y1="-28" x2="72" y2="-20" stroke="#666" stroke-width="0.7" opacity="0.5"/>
    <line x1="72" y1="20"  x2="72" y2="28"  stroke="#666" stroke-width="0.7" opacity="0.5"/>
    <!-- Reflexos laterais -->
    <ellipse cx="-58" cy="0" rx="2" ry="5" fill="#888" opacity="0.4"/>
    <ellipse cx="58"  cy="0" rx="2" ry="5" fill="#888" opacity="0.4"/>
    <!-- Nós de IA -->
    <circle cx="-14" cy="-18" r="3.5" fill="#1D9E75" opacity="0.92"/>
    <circle cx="4"   cy="16"  r="2.5" fill="#5DCAA5" opacity="0.75"/>
    <circle cx="20"  cy="-10" r="3"   fill="#9FE1CB" opacity="0.65"/>
    <line x1="-14" y1="-18" x2="4"  y2="16"  stroke="#1D9E75" stroke-width="0.8" opacity="0.45"/>
    <line x1="4"   y1="16"  x2="20" y2="-10" stroke="#5DCAA5" stroke-width="0.8" opacity="0.4"/>
    <line x1="-14" y1="-18" x2="20" y2="-10" stroke="#9FE1CB" stroke-width="0.6" opacity="0.35"/>
  </g>

  <!-- Nome sobreposto -->
  <text
    font-family="Georgia,'Times New Roman',serif"
    font-size="52" font-weight="700"
    fill="#E8E8E8"
    x="208" y="115"
    letter-spacing="-2"
    filter="url(#txt-shadow)">Fit</text>
  <text
    font-family="Georgia,'Times New Roman',serif"
    font-size="52" font-weight="700"
    fill="#1D9E75"
    x="266" y="115"
    letter-spacing="-2"
    filter="url(#txt-shadow)">AI</text>

  <!-- Tagline -->
  <text
    font-size="10.5"
    fill="#5F5E5A"
    font-family="system-ui,sans-serif"
    letter-spacing="4"
    x="209" y="140">TREINO INTELIGENTE</text>

</svg>
